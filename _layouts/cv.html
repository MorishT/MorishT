---
layout: default
---
<!-- _layouts/cv.html -->
        <div class="post">

          <header class="post-header">
            <h1 class="post-title"><span class="lang-ja">{{ page.title }}</span><span class="lang-en">{{ page.title_en | default: page.title }}</span> {% if page.cv_pdf %}<a href="{{ page.cv_pdf | prepend: 'assets/pdf/' | relative_url}}" target="_blank" rel="noopener noreferrer" class="float-right"><i class="fas fa-file-pdf"></i></a>{% endif %}</h1>
            <p class="post-description">
              <span class="lang-ja">{{ page.description }}</span>
              <span class="lang-en">{{ page.description_en | default: page.description }}</span>
            </p>
          </header>

          <article>
            <div class="cv">
              {% include render_bilingual_content.html rendered_content=content %}
            </div>
          </article>

        </div>
