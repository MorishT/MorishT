---
layout: default
---
<!-- page.html -->
        <div class="post">

          <header class="post-header">
            <h1 class="post-title">
              <span class="lang-ja">{{ page.title }}</span>
              <span class="lang-en">{{ page.title_en | default: page.title }}</span>
            </h1>
            <p class="post-description">
              <span class="lang-ja">{{ page.description }}</span>
              <span class="lang-en">{{ page.description_en | default: page.description }}</span>
            </p>
          </header>

          <article>
            {{ content }}
          </article>

        </div>
